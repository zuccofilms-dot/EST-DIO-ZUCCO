<meta name="apple-mobile-web-app-title" content="Zucco">
<meta name="theme-color" content="#0e0e0f">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0f;
    --surface: #1a1a1c;
    --surface2: #242426;
    --surface3: #2e2e31;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --text2: #a09d98;
    --text3: #6b6865;
    --accent: #e8c97a;
    --accent2: #c9a84c;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overscroll-behavior: none; }
  .app { max-width: 780px; margin: 0 auto; padding: 0 0 100px 0; }

  .header { padding: 16px 20px 16px; position: sticky; top: 0; background: var(--bg); z-index: 50; border-bottom: 1px solid var(--border); }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .logo-img { height: 44px; width: auto; }
  .add-btn { background: var(--accent); color: #0e0e0f; border: none; border-radius: var(--radius-sm); padding: 8px 16px; font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity 0.15s; }
  .add-btn:hover { opacity: 0.85; }
  .add-btn:active { transform: scale(0.97); }

  .sync-bar { display: none; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
  .sync-dot.ok { background: #4ade99; }
  .sync-dot.err { background: #f87171; }
  .sync-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .nav { display: flex; align-items: center; gap: 8px; }
  .nav-btn { width: 36px; height: 36px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text2); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; flex-shrink: 0; }
  .nav-btn:hover { background: var(--surface3); color: var(--text); }
  .month-label { font-size: 17px; font-weight: 500; color: var(--text); flex: 1; text-align: center; }
  .today-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text2); font-size: 12px; font-weight: 500; font-family: 'DM Sans', sans-serif; padding: 4px 10px; cursor: pointer; height: 36px; }
  .today-btn:hover { background: var(--surface3); color: var(--text); }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 16px 20px 0; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; }
  .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 600; }

  .legend { display: flex; flex-wrap: wrap; gap: 6px 14px; padding: 14px 20px 0; }
  .leg { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
  .leg-dot { width: 8px; height: 8px; border-radius: 50%; }

  .cal-wrap { padding: 16px 20px 0; }
  .day-headers { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
  .day-header { text-align: center; font-size: 11px; font-weight: 500; color: var(--text3); padding: 4px 0; text-transform: uppercase; letter-spacing: 0.5px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .day-cell { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); min-height: 82px; padding: 7px 6px 6px; cursor: pointer; transition: border-color 0.15s, background 0.15s; overflow: hidden; }
  .day-cell:hover { border-color: var(--border2); background: var(--surface2); }
  .day-cell.empty { background: transparent; border-color: transparent; cursor: default; pointer-events: none; }
  .day-cell.today { border-color: var(--accent); }
  .day-cell.today .day-num { color: var(--accent); font-weight: 600; }
  .day-num { font-size: 12px; color: var(--text3); margin-bottom: 5px; line-height: 1; }
  .ev-pill { font-size: 10px; font-weight: 500; border-radius: 4px; padding: 2px 5px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.5; }
  .more { font-size: 10px; color: var(--text3); margin-top: 2px; }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); align-items: flex-end; justify-content: center; }
  .overlay.open { display: flex; }
  @media (min-width: 600px) { .overlay { align-items: center; padding: 20px; } .modal { border-radius: var(--radius); max-height: 90vh; } }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius) var(--radius) 0 0; padding: 20px; width: 100%; max-width: 460px; max-height: 92vh; overflow-y: auto; }
  .modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; display: block; }
  @media (min-width: 600px) { .modal-handle { display: none; } }
  .modal-title { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .field input, .field select, .field textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 10px 12px; outline: none; transition: border-color 0.15s; appearance: none; -webkit-appearance: none; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 70px; }
  .type-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  @media (min-width: 400px) { .type-grid { grid-template-columns: repeat(3, 1fr); } }
  .type-opt { background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 8px; text-align: center; cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--text2); transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .type-opt .ico { font-size: 18px; }
  .type-opt.selected { color: var(--text); font-weight: 500; }
  .date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-btns { display: flex; gap: 10px; margin-top: 18px; }
  .modal-btns button { flex: 1; padding: 12px; border-radius: var(--radius-sm); font-size: 15px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); transition: all 0.15s; }
  .modal-btns button:hover { background: var(--surface3); color: var(--text); }
  .modal-btns button.primary { background: var(--accent); color: #0e0e0f; border-color: var(--accent); font-weight: 600; }
  .modal-btns button.primary:hover { background: var(--accent2); border-color: var(--accent2); }
  .modal-btns button:active { transform: scale(0.97); }
  .modal-btns button:disabled { opacity: 0.5; cursor: not-allowed; }

  .ev-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .ev-item:last-child { border-bottom: none; }
  .ev-color-bar { width: 3px; border-radius: 2px; align-self: stretch; flex-shrink: 0; margin-top: 2px; min-height: 16px; }
  .ev-info { flex: 1; min-width: 0; }
  .ev-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .ev-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .ev-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 18px; padding: 2px 4px; border-radius: 4px; transition: color 0.15s; flex-shrink: 0; }
  .ev-del:hover { color: #f87171; }
  .empty-day { font-size: 14px; color: var(--text3); text-align: center; padding: 20px 0; }

  .section-title { font-size: 13px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; padding: 20px 20px 10px; }
  .upcoming-list { padding: 0 20px; display: flex; flex-direction: column; gap: 8px; }
  .upcoming-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; display: flex; align-items: center; gap: 12px; }
  .up-date { text-align: center; min-width: 38px; }
  .up-day { font-size: 20px; font-weight: 600; color: var(--text); line-height: 1; }
  .up-month { font-size: 10px; color: var(--text3); text-transform: uppercase; }
  .up-bar { width: 3px; border-radius: 2px; align-self: stretch; min-height: 30px; flex-shrink: 0; }
  .up-info { flex: 1; min-width: 0; }
  .up-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .up-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .no-upcoming { font-size: 14px; color: var(--text3); padding: 0 20px; }

  @media (max-width: 480px) { .stats { grid-template-columns: repeat(2, 1fr); } .day-cell { min-height: 60px; padding: 5px 4px 4px; } .ev-pill { font-size: 9px; padding: 1px 4px; } .stat-val { font-size: 18px; } }
  @media (max-width: 360px) { .day-cell { min-height: 52px; } .day-header { font-size: 9px; } }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>

    const btn = document.getElementById('save-btn');
    btn.disabled = true; btn.textContent = 'Salvando...';
    const ev = { type: selectedType, title: title, date: date, time: document.getElementById('ev-time').value, note: document.getElementById('ev-note').value.trim() };
    try {
      const res = await fetch(API, { method: 'POST', headers: HEADERS, body: JSON.stringify(ev) });
      if (!res.ok) throw new Error();
      closeModal('modal-add');
      await loadEvents();
    } catch(e) {
      alert('Erro ao salvar. Verifique sua conexão.');
    }
    btn.disabled = false; btn.textContent = 'Salvar';
  }

  async function delEvent(id, date) {
    if (!confirm('Remover este evento?')) return;
    try {
      await fetch(API + '?id=eq.' + id, { method: 'DELETE', headers: HEADERS });
      await loadEvents();
      renderDayList(date);
    } catch(e) { alert('Erro ao remover.'); }
  }

  function changeMonth(d) { cur.m += d; if(cur.m<0){cur.m=11;cur.y--;} if(cur.m>11){cur.m=0;cur.y++;} render(); }
  function goToday() { cur = { y: today.getFullYear(), m: today.getMonth() }; render(); }

  function buildLegend() {
    document.getElementById('legend').innerHTML = TYPES.map(function(t){
      return '<div class="leg"><div class="leg-dot" style="background:'+t.color+'"></div>'+t.label+'</div>';
    }).join('');
  }

  function buildTypeGrid() {
    document.getElementById('type-grid').innerHTML = TYPES.map(function(t){
      var sel = t.id === selectedType;
      return '<div class="type-opt'+(sel?' selected':'')+'" onclick="selectType(\''+t.id+'\')" style="'+(sel?'border-color:'+t.color+';color:'+t.color+';background:'+t.bg:'')+'"><span class="ico">'+t.emoji+'</span><span>'+t.label+'</span></div>';
    }).join('');
  }

  function selectType(id) { selectedType = id; buildTypeGrid(); }

  function renderStats() {
    var todayStr = today.toISOString().split('T')[0];
    var d30 = new Date(today); d30.setDate(d30.getDate()+30);
    var d30Str = d30.toISOString().split('T')[0];
    var counts = { casamento:0, evento:0, pagamento:0, reuniao:0 };
    events.forEach(function(ev){
      if(ev.date >= todayStr && ev.date <= d30Str && counts[ev.type]!==undefined) counts[ev.type]++;
    });
    var show = [
      {id:'casamento', label:'Próx. 30 dias'},
      {id:'evento', label:'Eventos'},
      {id:'pagamento', label:'Pagamentos'},
      {id:'reuniao', label:'Reuniões'}
    ];
    document.getElementById('stats').innerHTML = show.map(function(s){
      var t = typeMap[s.id];
      return '<div class="stat"><div class="stat-label">'+s.label+'</div><div class="stat-val" style="color:'+t.color+'">'+counts[s.id]+'</div></div>';
    }).join('');
  }

  function render() {
    document.getElementById('month-label').textContent = MONTHS[cur.m]+' '+cur.y;
    document.getElementById('day-headers').innerHTML = DAYS_SHORT.map(function(d){ return '<div class="day-header">'+d+'</div>'; }).join('');
    var cal = document.getElementById('cal');
    var first = new Date(cur.y, cur.m, 1).getDay();
    var days = new Date(cur.y, cur.m+1, 0).getDate();
    var html = '';
    for(var i=0;i<first;i++) html += '<div class="day-cell empty"></div>';
    for(var d=1;d<=days;d++) {
      var ds = cur.y+'-'+String(cur.m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      var isToday = d===today.getDate() && cur.m===today.getMonth() && cur.y===today.getFullYear();
      var evs = events.filter(function(e){ return e.date===ds; });
      var pills = evs.slice(0,3).map(function(ev){
        var t = typeMap[ev.type]||typeMap.outro;
        return '<div class="ev-pill" style="background:'+t.bg+';color:'+t.color+'">'+ev.title+'</div>';
      }).join('');
      if(evs.length>3) pills += '<div class="more">+'+(evs.length-3)+'</div>';
      html += '<div class="day-cell'+(isToday?' today':'')+'" onclick="openDay(\''+ds+'\')"><div class="day-num">'+d+'</div>'+pills+'</div>';
    }
    cal.innerHTML = html;
    renderStats();
    renderUpcoming();
  }

  function renderUpcoming() {
    var todayStr = today.toISOString().split('T')[0];
    var upcoming = events.filter(function(e){ return e.date >= todayStr; }).slice(0,6);
    var el = document.getElementById('upcoming');
    if(!upcoming.length) { el.innerHTML = '<p class="no-upcoming">Nenhum evento próximo.</p>'; return; }
    el.innerHTML = upcoming.map(function(ev){
      var t = typeMap[ev.type]||typeMap.outro;
      var parts = ev.date.split('-');
      var meta = [ev.time, ev.valor ? 'R$ '+ev.valor : null, ev.note].filter(Boolean).join(' · ');
      return '<div class="upcoming-item"><div class="up-date"><div class="up-day">'+parseInt(parts[2])+'</div><div class="up-month">'+MONTHS_SHORT[parseInt(parts[1])-1]+'</div></div><div class="up-bar" style="background:'+t.color+'"></div><div class="up-info"><div class="up-name">'+ev.title+'</div>'+(meta?'<div class="up-meta">'+meta+'</div>':'')+'</div><span style="font-size:18px">'+t.emoji+'</span></div>';
    }).join('');
  }

  function openDay(date) {
    selectedDate = date;
    var parts = date.split('-');
    document.getElementById('day-title').textContent = parseInt(parts[2])+' de '+MONTHS[parseInt(parts[1])-1];
    renderDayList(date);
    document.getElementById('modal-day').classList.add('open');
  }

  function renderDayList(date) {
    var evs = events.filter(function(e){ return e.date===date; });
    var el = document.getElementById('day-ev-list');
    if(!evs.length) { el.innerHTML = '<div class="empty-day">Nenhum evento neste dia</div>'; return; }
    el.innerHTML = evs.map(function(ev){
      var t = typeMap[ev.type]||typeMap.outro;
      var meta = [ev.time, ev.note].filter(Boolean).join(' · ');
      return '<div class="ev-item"><div class="ev-color-bar" style="background:'+t.color+'"></div><div class="ev-info"><div class="ev-name">'+t.emoji+' '+ev.title+'</div>'+(meta?'<div class="ev-meta">'+meta+'</div>':'')+'</div><button class="ev-del" onclick="delEvent(\''+ev.id+'\',\''+date+'\')">×</button></div>';
    }).join('');
  }

  function openAdd(date) {
    editingId = null;
    document.getElementById('modal-add-title').textContent = 'Novo evento';
    document.getElementById('save-btn').textContent = 'Salvar';
    selectedDate = date||'';
    selectedType = 'casamento';
    document.getElementById('ev-title').value='';
    document.getElementById('ev-valor').value='';
    document.getElementById('ev-date').value=date||'';
    document.getElementById('ev-time').value='';
    document.getElementById('ev-note').value='';
    document.getElementById('ev-type').value='casamento';
    document.getElementById('modal-add').classList.add('open');
    setTimeout(function(){ document.getElementById('ev-title').focus(); },300);
  }

  function openAddFromDay() { closeModal('modal-day'); setTimeout(function(){ openAdd(selectedDate); },100); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  function closeIfBg(e,id) { if(e.target.id===id) closeModal(id); }
  document.addEventListener('keydown',function(e){ if(e.key==='Escape'){ closeModal('modal-add'); closeModal('modal-day'); } });

  function openEdit(id) {
    var ev = events.find(function(e){ return e.id===id; });
    if(!ev) return;
    editingId = id;
    selectedType = ev.type;
    document.getElementById('ev-title').value = ev.title||'';
    document.getElementById('ev-date').value = ev.date||'';
    document.getElementById('ev-time').value = ev.time||'';
    document.getElementById('ev-valor').value = ev.valor||'';
    document.getElementById('ev-note').value = ev.note||'';
    document.getElementById('ev-type').value = ev.type||'casamento';
    document.getElementById('modal-add-title').textContent = 'Editar evento';
    document.getElementById('save-btn').textContent = 'Salvar alterações';
    closeModal('modal-day');
    setTimeout(function(){ document.getElementById('modal-add').classList.add('open'); },100);
  }

  async function updateEvent() {
    var title = document.getElementById('ev-title').value.trim();
    var date = document.getElementById('ev-date').value;
    if(!title) { alert('Informe o título.'); return; }
    if(!date) { alert('Informe a data.'); return; }
    var btn = document.getElementById('save-btn');
    btn.disabled = true; btn.textContent = 'Salvando...';
    var ev = { type: selectedType, title: title, date: date, time: document.getElementById('ev-time').value, valor: document.getElementById('ev-valor').value.trim(), note: document.getElementById('ev-note').value.trim() };
    try {
      var res = await fetch(API + '?id=eq.' + editingId, { method: 'PATCH', headers: HEADERS, body: JSON.stringify(ev) });
      if(!res.ok) throw new Error();
      editingId = null;
      closeModal('modal-add');
      document.getElementById('modal-add-title').textContent = 'Novo evento';
      await loadEvents();
    } catch(e) {
      alert('Erro ao salvar. Verifique sua conexão.');
    }
    btn.disabled = false; btn.textContent = editingId ? 'Salvar alterações' : 'Salvar';
  }

  buildLegend();
  loadEvents();
  setInterval(loadEvents, 60000);
</script>
</body>
</html>
